<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}boxwatchr{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>
<body>
    <nav>
        <span class="brand">boxwatchr</span>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Stats</a>
        <a href="/logs" {% if request.path.startswith('/logs') %}class="active"{% endif %}>Logs</a>
        <div class="nav-right">
            {% if show_logout %}
            <a href="/logout">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
</body>
</html>
